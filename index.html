<head>

<title>Quinn and Payson</title><style>
  @font-face {font-family:'やたら';src:url('PretendardStd-Medium.woff2')}
  @font-face {font-family:'やたら太';src:url('PretendardStd-SemiBold.woff2')}
  body {font-size:16px;color:#fff;background:#000;font-family:'やたら',system-ui;margin:0;min-height:100vh;display:flex;flex-direction: column;align-items: center;text-align:center}
  .f {width:100%;height:50vh;max-height: 500px;mask-image:linear-gradient(to bottom,black 40%,transparent 100%);-webkit-mask-image:linear-gradient(to bottom,black 40%,transparent 100%);animation:reveal 0.6s ease-out forwards}
  .f img {width:100%;height:100%;object-fit:cover; opacity:0.75}}
  .content {text-align:center;margin-top:-40px;z-index:10;animation:fadeUp 3.0s 0.3s both cubic-bezier(0.2,0.8,0.2,1)}

  p {color:#86868b;margin:0}
  .btn {display:inline-block;margin-top:12px;text-decoration:none !important;color:#fff;border-bottom:1px solid #333337;transition: border-color 0.3s}
  @keyframes reveal {from{opacity:0;filter:blur(6px)} to{opacity:1;filter:blur(0)}}
  @keyframes fadeUp {from {opacity:0;transform:translateY(15px)} to {opacity:1;transform:translateY(0)}}</style></head>
